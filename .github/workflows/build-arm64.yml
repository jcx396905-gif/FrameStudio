name: Build macOS arm64

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload to'
        required: true

jobs:
  build-arm64:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build arm64 Catalyst
        run: |
          # Build Catalyst arm64 using generic platform destination (avoids local Mac version check)
          xcodebuild -project liquidglassphotoframe.xcodeproj \
            -scheme liquidglassphotoframe \
            -configuration Release \
            -destination 'generic/platform=macOS,variant=Mac Catalyst' \
            -derivedDataPath DerivedData \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Find and verify .app
        run: |
          APP=$(find DerivedData -name "*.app" -path "*/Release*" -type d | head -1)
          echo "APP=$APP" >> $GITHUB_ENV
          echo "Found: $APP"
          file "$APP/Contents/MacOS/"*

      - name: Create DMG
        run: |
          hdiutil create -volname "Frame Studio" \
            -srcfolder "${{ env.APP }}" \
            -ov -format UDZO \
            FrameStudio-macOS-arm64.dmg
          ls -lh FrameStudio-macOS-arm64.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: FrameStudio-macOS-arm64.dmg
